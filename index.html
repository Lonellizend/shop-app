<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD CMS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #0f0f0f; --card: #1c1c1e; --text: #fff; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card); border-radius: 16px; overflow: hidden; position: relative; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { color: var(--gold); font-weight: bold; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); font-size: 10px; }
        .nav-item.active { color: var(--gold); }

        /* Admin & UI */
        .btn { background: var(--gold); color: #000; border: none; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-danger { background: #ff3b30; color: #fff; }
        .input-group { background: #2c2c2e; border: none; padding: 12px; border-radius: 10px; color: white; width: 100%; margin-bottom: 10px; outline: none; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto; }
        
        .cms-item { background: #2c2c2e; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .faq-box details { border-bottom: 1px solid #333; padding: 10px 0; }
        .profile-stat { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-around; text-align: center; }
    </style>
</head>
<body>

    <div id="page-shop" class="page active"><div class="grid" id="shop-grid"></div></div>
    
    <div id="page-cart" class="page">
        <h2>Корзина</h2>
        <div id="cart-list"></div>
        <div id="order-form" style="display:none; margin-top:20px;">
            <select id="delivery" class="input-group"><option value="Курьер">🚕 Курьер</option><option value="СДЭК">📦 СДЭК</option></select>
            <select id="payment" class="input-group"><option value="Карта">💳 Карта (СБП)</option><option value="Наличные">💵 Наличные</option></select>
            <button class="btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-stat">
            <div><div id="u-bal" style="color:var(--gold); font-weight:bold;">0 ₽</div><div style="font-size:10px; color:var(--gray);">Баланс</div></div>
            <div><div id="u-spent" style="color:white; font-weight:bold;">0 ₽</div><div style="font-size:10px; color:var(--gray);">Покупки</div></div>
        </div>
        <button class="btn" onclick="showModal('referral')">🔗 Реферальная ссылка</button>
        <div class="faq-box" style="margin-top:20px;">
            <h3>FAQ</h3>
            <details><summary>Как получить бонус?</summary><p>Пригласите друга! За каждую его покупку вы получите 200 ₽ на баланс.</p></details>
            <details><summary>Срок доставки?</summary><p>Обычно от 1 до 3 рабочих дней.</p></details>
        </div>
    </div>

    <div id="page-admin" class="page">
        <div style="display:flex; gap:5px; margin-bottom:15px; overflow-x:auto;">
            <button class="btn" style="width:auto;" onclick="switchAdm('prods')">Товары</button>
            <button class="btn" style="width:auto;" onclick="switchAdm('users')">Юзеры</button>
            <button class="btn" style="width:auto;" onclick="switchAdm('promos')">Промо</button>
        </div>
        
        <div id="adm-prods">
            <button class="btn" onclick="editProduct()">+ Добавить товар</button>
            <div id="cms-prods-list" style="margin-top:15px;"></div>
        </div>
        
        <div id="adm-users" style="display:none;">
            <input type="text" class="input-group" placeholder="Поиск (ID или @юзер)" oninput="searchUsers(this.value)">
            <div id="cms-users-list"></div>
        </div>

        <div id="adm-promos" style="display:none;">
            <div style="display:flex; gap:5px;">
                <input id="p-code" placeholder="Код" class="input-group">
                <input id="p-disc" placeholder="%" class="input-group" style="width:60px;">
                <button class="btn" style="width:45px; margin:0;" onclick="savePromo()">+</button>
            </div>
            <div id="cms-promos-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('shop', this)">🛍<div>Магазин</div></div>
        <div class="nav-item" onclick="nav('cart', this)">🛒<div>Корзина</div></div>
        <div class="nav-item" onclick="nav('profile', this)">👤<div>Профиль</div></div>
        <div class="nav-item" id="nav-admin" style="display:none;" onclick="nav('admin', this)">⚙️<div>CMS</div></div>
    </nav>

    <div class="modal-overlay" id="modal-base" onclick="if(event.target==this)closeModal()">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = 'https://cultures-current-news-scott.trycloudflare.com'; // ЗАМЕНИ ПРИ ЗАПУСКЕ
        const ADMINS = [1733464126];
        
        let state = { products: [], cart: JSON.parse(localStorage.getItem('kg_cart') || '[]'), favs: [], user: {}, adminData: null };

        async function req(path, method='GET', body=null) {
            const opts = { method, headers: {'Content-Type': 'application/json'} };
            if(body) opts.body = JSON.stringify(body);
            try { 
                const res = await fetch(`${API}${path}`, opts);
                return res.ok ? await res.json() : null;
            } catch(e) { return null; }
        }

        async function init() {
            const uid = tg.initDataUnsafe.user?.id || 0;
            if(ADMINS.includes(uid)) document.getElementById('nav-admin').style.display='flex';
            
            const data = await req(`/init?user_id=${uid}`);
            if(data) {
                state.products = data.products; state.user = data.user; state.favs = data.favorites;
                document.getElementById('u-bal').innerText = `${state.user.balance || 0} ₽`;
                document.getElementById('u-spent').innerText = `${state.user.total_spent || 0} ₽`;
                renderShop();
                if(ADMINS.includes(uid)) loadAdminData();
            }
        }

        function renderShop() {
            document.getElementById('shop-grid').innerHTML = state.products.map(p => `
                <div class="product-card">
                    <img src="${p.image_url || 'https://via.placeholder.com/150'}">
                    <div class="card-body">
                        <div class="price">${p.price} ₽</div>
                        <div style="font-size:12px; height:32px; overflow:hidden;">${p.name}</div>
                        <button class="btn" style="padding:5px; font-size:12px;" onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = state.products.find(x => x.id === id);
            state.cart.push(p);
            localStorage.setItem('kg_cart', JSON.stringify(state.cart));
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("Добавлено!");
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(!state.cart.length) { list.innerHTML = "Корзина пуста"; document.getElementById('order-form').style.display='none'; return; }
            
            document.getElementById('order-form').style.display='block';
            list.innerHTML = state.cart.map((p, index) => `
                <div class="cms-item">
                    <span>${p.name} (${p.price} ₽)</span>
                    <button class="btn btn-danger" style="width:auto; padding:5px 10px;" onclick="removeFromCart(${index})">✕</button>
                </div>
            `).join('');
        }

        function removeFromCart(index) {
            state.cart.splice(index, 1);
            localStorage.setItem('kg_cart', JSON.stringify(state.cart));
            renderCart();
        }

        function checkout() {
            const total = state.cart.reduce((sum, p) => sum + p.price, 0);
            tg.sendData(JSON.stringify({
                action: 'checkout',
                order: state.cart,
                total: total,
                delivery: document.getElementById('delivery').value,
                payment: document.getElementById('payment').value
            }));
            state.cart = [];
            localStorage.removeItem('kg_cart');
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            el.classList.add('active');
            if(id === 'cart') renderCart();
        }

        // --- CMS ЛОГИКА ---
        async function loadAdminData() {
            const data = await req(`/admin_data?admin_id=${tg.initDataUnsafe.user?.id}`);
            if(!data) return;
            state.adminData = data;
            document.getElementById('cms-prods-list').innerHTML = state.products.map(p => `
                <div class="cms-item" onclick='editProduct(${JSON.stringify(p)})'>
                    <span>${p.name}</span>
                    <span style="color:var(--gold)">${p.price} ₽</span>
                </div>
            `).join('');
            renderAdminUsers();
        }

        function renderAdminUsers(filter='') {
            const list = document.getElementById('cms-users-list');
            const filtered = state.adminData.users.filter(u => String(u.user_id).includes(filter) || (u.username||'').includes(filter));
            list.innerHTML = filtered.map(u => `
                <div class="cms-item" onclick='showUserCard(${JSON.stringify(u)})'>
                    <span>@${u.username || u.user_id}</span>
                    <span>${u.balance} ₽</span>
                </div>
            `).join('');
        }

        function showUserCard(u) {
            showModal('custom', `
                <h3>Пользователь</h3>
                <p>ID: ${u.user_id}</p>
                <div class="input-group">Баланс: <input type="number" id="edit-bal" value="${u.balance}" style="background:none; border:none; color:white; width:80px;"></div>
                <p>Пригласил: ${u.invited_count} чел.</p>
                <p>Покупок рефов: ${u.invited_bought_count || 0}</p>
                <button class="btn" onclick="saveUser(${u.user_id})">Сохранить</button>
            `);
        }

        async function saveUser(uid) {
            const bal = document.getElementById('edit-bal').value;
            await admAction('update_user', {target_id: uid, balance: bal});
        }

        function editProduct(p=null) {
            showModal('custom', `
                <h3>${p?'Редактировать':'Новый товар'}</h3>
                <input id="ep-id" type="hidden" value="${p?p.id:''}">
                <input id="ep-name" class="input-group" placeholder="Название" value="${p?p.name:''}">
                <input id="ep-price" type="number" class="input-group" placeholder="Цена" value="${p?p.price:''}">
                <textarea id="ep-desc" class="input-group" placeholder="Описание">${p?p.description:''}</textarea>
                <input type="file" id="ep-file" class="input-group" onchange="uploadImg(this)">
                <input type="hidden" id="ep-img" value="${p?p.image_url:''}">
                <button class="btn" onclick="saveProduct()">Сохранить</button>
                ${p ? `<button class="btn btn-danger" onclick="deleteProduct(${p.id})">Удалить</button>` : ''}
            `);
        }

        function uploadImg(input) {
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('ep-img').value = e.target.result; tg.showAlert("Фото загружено в память"); };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveProduct() {
            const payload = {
                id: document.getElementById('ep-id').value,
                name: document.getElementById('ep-name').value,
                price: document.getElementById('ep-price').value,
                description: document.getElementById('ep-desc').value,
                image_url: document.getElementById('ep-img').value,
                category: 'Общее'
            };
            await admAction('save_product', payload);
        }

        async function admAction(action, payload) {
            payload.admin_id = tg.initDataUnsafe.user?.id;
            payload.action = action;
            const res = await req('/admin_action', 'POST', payload);
            if(res && res.status === 'ok') {
                tg.showAlert("Успешно!");
                closeModal();
                init(); // Перезагружаем всё
            } else {
                tg.showAlert("Ошибка сервера!");
            }
        }

        function showModal(type, content='') {
            const b = document.getElementById('modal-body');
            if(type === 'referral') {
                const link = `https://t.me/ТУТ_ИМЯ_БОТА?start=${tg.initDataUnsafe.user?.id}`;
                b.innerHTML = `<h3>Партнерка</h3><p>Получайте 200 ₽ за каждую покупку друга!</p><input class="input-group" value="${link}" readonly><button class="btn" onclick="navigator.clipboard.writeText('${link}'); tg.showAlert('Скопировано!')">Копировать</button>`;
            } else { b.innerHTML = content; }
            document.getElementById('modal-base').style.display='flex';
        }

        function closeModal() { document.getElementById('modal-base').style.display='none'; }
        function switchAdm(t) { ['prods','users','promos'].forEach(x => document.getElementById('adm-'+x).style.display = x===t?'block':'none'); }
        function searchUsers(v) { renderAdminUsers(v); }

        window.onload = init;
    </script>
</body>
</html>
