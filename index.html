<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-gray: #888888;
            --tab-bg: rgba(20, 20, 20, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Навигация сверху (Категории) */
        .top-nav {
            position: sticky; top: 0; background: var(--bg); z-index: 100;
            padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #222;
        }
        .nav-chip {
            padding: 8px 16px; border-radius: 20px; background: #222;
            color: var(--text-gray); font-size: 14px; border: none; transition: 0.3s;
        }
        .nav-chip.active { background: var(--gold); color: black; font-weight: 600; }

        /* Контентные секции */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Карточка товара (стиль маркетплейса) */
        .product-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .product-img {
            width: 100%; aspect-ratio: 3/4; object-fit: cover;
            background: #252525; /* Заглушка, пока нет фото */
        }
        .product-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-price { font-size: 18px; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
        .product-name { font-size: 13px; color: #ccc; margin-bottom: 10px; line-height: 1.2; height: 32px; overflow: hidden; }
        
        .add-to-cart {
            background: var(--gold); color: black; border: none; padding: 10px;
            border-radius: 8px; font-weight: bold; font-size: 12px; width: 100%;
        }

        /* Таб-бар (нижние кнопки) */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--tab-bg); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-gray); text-decoration: none; font-size: 10px; gap: 4px;
        }
        .tab-item.active { color: var(--gold); }
        .tab-icon { font-size: 20px; }

        /* Корзина */
        .cart-item {
            background: var(--card-bg); margin-bottom: 10px; padding: 10px;
            border-radius: 12px; display: flex; align-items: center; gap: 15px;
        }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; }

        /* Профиль */
        .profile-header { text-align: center; padding: 30px 0; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--gold); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: black; }
    </style>
</head>
<body>

    <!-- Шапка каталога -->
    <div id="header-nav" class="top-nav">
        <button class="nav-chip active" onclick="switchCategory('catalog', this)">Основные вещи</button>
        <button class="nav-chip" onclick="switchCategory('look', this)">Готовые образы</button>
    </div>

    <!-- Страница: КАТАЛОГ -->
    <div id="page-catalog" class="page active">
        <div id="product-grid" class="grid"></div>
    </div>

    <!-- Страница: КОРЗИНА -->
    <div id="page-cart" class="page">
        <h2 style="color: var(--gold)">Корзина</h2>
        <div id="cart-content"></div>
        <div id="cart-empty" style="text-align: center; margin-top: 50px; color: #555;">
            Ваша корзина пуста
        </div>
    </div>

    <!-- Страница: ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-header">
            <div class="avatar" id="user-icon">👤</div>
            <h3 id="user-name">Клиент KODAMA</h3>
            <p style="color: var(--text-gray); font-size: 14px;">Статус: Gold Member</p>
        </div>
        <div style="background: var(--card-bg); border-radius: 15px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <span>Заказов:</span> <span id="stats-orders">0</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Потрачено:</span> <span id="stats-spent" style="color: var(--gold)">0 ₽</span>
            </div>
        </div>
    </div>

    <!-- Нижний Таб-бар -->
    <nav class="tab-bar">
        <div class="tab-item active" onclick="showPage('catalog', this)">
            <span class="tab-icon">🛍</span>
            <span>Каталог</span>
        </div>
        <div class="tab-item" onclick="showPage('cart', this)">
            <span class="tab-icon">🛒</span>
            <span>Корзина</span>
        </div>
        <div class="tab-item" onclick="showPage('profile', this)">
            <span class="tab-icon">👤</span>
            <span>Профиль</span>
        </div>
    </nav>

    <script>
        const API_URL = 'https://increased-beaver-voices-cam.trycloudflare.com'; // ВАША ССЫЛКА
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let allProducts = [];
        let cart = [];
        let currentCat = 'catalog';

        // Инициализация пользователя
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) {
                document.getElementById('user-icon').innerHTML = `<img src="${tg.initDataUnsafe.user.photo_url}" style="width:100%; border-radius:50%">`;
            }
        }

        // Переключение вкладок (Каталог/Корзина/Профиль)
        function showPage(pageId, el) {
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            el.classList.add('active');

            // Скрываем/показываем верхние категории только в каталоге
            document.getElementById('header-nav').style.display = (pageId === 'catalog') ? 'flex' : 'none';
            
            if (pageId === 'cart') renderCart();
            updateMainButton();
        }

        // Переключение категорий внутри каталога
        function switchCategory(cat, el) {
            tg.HapticFeedback.impactOccurred('medium');
            document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCat = cat;
            renderProducts();
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                allProducts = await res.json();
                renderProducts();
            } catch (e) {
                console.error("Ошибка сети");
            }
        }

        function renderProducts() {
            const container = document.getElementById('product-grid');
            container.innerHTML = '';
            
            const filtered = allProducts.filter(p => p.category === currentCat);
            
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                // Здесь мы используем p.photo_id если бы был URL, но пока ставим заглушку
                div.innerHTML = `
                    <div style="position:relative">
                        <img src="https://via.placeholder.com/300x400/222/D4AF37?text=KODAMA" class="product-img">
                        <div style="position:absolute; top:10px; left:10px; background:red; color:white; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:bold">-15%</div>
                    </div>
                    <div class="product-info">
                        <div class="product-price">${p.price.toLocaleString()} ₽</div>
                        <div class="product-name">${p.name}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addToCart(id) {
            tg.HapticFeedback.notificationOccurred('success');
            const product = allProducts.find(p => p.id === id);
            cart.push(product);
            updateMainButton();
        }

        function renderCart() {
            const container = document.getElementById('cart-content');
            const emptyMsg = document.getElementById('cart-empty');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';

            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img src="https://via.placeholder.com/60x60/222/D4AF37?text=K">
                    <div style="flex-grow:1">
                        <div style="font-weight:bold; font-size:14px">${item.name}</div>
                        <div style="color:var(--gold); font-weight:bold">${item.price} ₽</div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#ff4444; font-size:20px">×</button>
                `;
                container.appendChild(div);
            });
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updateMainButton();
        }

        function updateMainButton() {
            if (cart.length > 0) {
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ • ${total.toLocaleString()} ₽`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        tg.onEvent('mainButtonClicked', () => {
            tg.sendData(JSON.stringify({
                order: cart,
                total: cart.reduce((sum, item) => sum + item.price, 0)
            }));
        });

        loadProducts();
    </script>
</body>
</html>
