<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Анимация сердечка */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .fav-btn.active { color: #ff4444; animation: heartBeat 0.3s ease-in-out; }

        .tabs { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .tab { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--gold); }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* Карточка товара */
        .card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-content { padding: 10px; }
        .price { color: var(--gold); font-weight: bold; font-size: 18px; }

        /* CMS Форма */
        .admin-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Корзина */
        .cart-item { display: flex; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .cart-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--gold); margin-right: 15px; }
    </style>
</head>
<body>

    <!-- МАГАЗИН -->
    <div id="page-shop" class="page active">
        <div id="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <!-- КОРЗИНА -->
    <div id="page-cart" class="page">
        <h2 style="color:var(--gold)">Ваш выбор</h2>
        <div id="cart-list"></div>
        <div id="order-settings" style="display:none; margin-top: 20px;">
            <select class="admin-input" id="delivery">
                <option value="yandex">🚕 Яндекс Доставка</option>
                <option value="cdek">📦 СДЭК</option>
                <option value="pickup">🏠 Самовывоз</option>
            </select>
            <select class="admin-input" id="payment">
                <option value="sbp">💳 СБП</option>
                <option value="qr">📱 QR-код</option>
                <option value="cash">💵 Наличные/Перевод</option>
            </select>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #333;">
            <div style="font-size:20px;">Баланс: <b id="bal" style="color:var(--gold)">0</b> ₽</div>
            <div style="color:#888; font-size:12px; margin-top:5px;">Друзей приглашено: <span id="refs">0</span></div>
            <div style="margin-top:15px; font-size:12px; background:#000; padding:10px; border-radius:8px;" id="ref-link"></div>
        </div>
        <button class="btn-gold" style="margin-top:15px; background:#222; color:white;" onclick="tg.openTelegramLink('https://t.me/+TVcFeudRH184NzEy')">💬 Чат поддержки</button>
    </div>

    <!-- CMS (ДЛЯ АДМИНА) -->
    <div id="page-admin" class="page">
        <h2 style="color:var(--gold)">Добавить товар</h2>
        <input type="text" id="adm-name" class="admin-input" placeholder="Название">
        <input type="number" id="adm-price" class="admin-input" placeholder="Цена">
        <input type="text" id="adm-img" class="admin-input" placeholder="URL картинки">
        <textarea id="adm-desc" class="admin-input" placeholder="Описание"></textarea>
        <select id="adm-cat" class="admin-input">
            <option value="catalog">Одежда</option>
            <option value="look">Образ</option>
        </select>
        <button class="btn-gold" onclick="apiAddProduct()">ОПУБЛИКОВАТЬ В МАГАЗИН</button>
    </div>

    <nav class="tabs">
        <div class="tab active" onclick="showP('shop', this)">🛍 Магазин</div>
        <div class="tab" onclick="showP('cart', this)">🛒 Корзина</div>
        <div class="tab" onclick="showP('profile', this)">👤 Профиль</div>
        <div id="adm-btn" class="tab" style="display:none" onclick="showP('admin', this)">🛠 CMS</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = 'https://cultures-current-news-scott.trycloudflare.com'; // Сюда ссылку на сервер
        const ADMINS = [1733464126];
        let products = [], cart = [];

        if(ADMINS.includes(tg.initDataUnsafe.user?.id)) document.getElementById('adm-btn').style.display='flex';

        async function load() {
            const res = await fetch(`${API}/products`);
            products = await res.json();
            renderShop();
            
            if(tg.initDataUnsafe.user) {
                const s = await fetch(`${API}/user_stats?user_id=${tg.initDataUnsafe.user.id}`);
                const stats = await s.json();
                document.getElementById('bal').innerText = stats.balance;
                document.getElementById('refs').innerText = stats.invited_count;
                document.getElementById('ref-link').innerText = `https://t.me/ВАШ_БОТ?start=${tg.initDataUnsafe.user.id}`;
            }
        }

        function renderShop() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            products.forEach(p => {
                g.innerHTML += `
                <div class="card">
                    <img src="${p.image_url || 'https://via.placeholder.com/300'}">
                    <div class="card-content">
                        <div class="price">${p.price} ₽</div>
                        <div style="font-size:12px; margin-bottom:10px;">${p.name}</div>
                        <button class="btn-gold" style="padding:8px" onclick="addToCart(${p.id})">В КОРЗИНУ</button>
                    </div>
                </div>`;
            });
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            cart.push({...p, selected: true});
            tg.showScanQrPopup({text: "Товар добавлен в корзину!"});
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        function renderCart() {
            const l = document.getElementById('cart-list'); l.innerHTML = '';
            if(!cart.length) { l.innerText = 'Пусто'; return; }
            document.getElementById('order-settings').style.display = 'block';
            cart.forEach((i, idx) => {
                l.innerHTML += `
                <div class="cart-item">
                    <input type="checkbox" ${i.selected?'checked':''} onchange="cart[${idx}].selected = this.checked; updBtn();">
                    <div style="flex-grow:1"><b>${i.name}</b><br><small>${i.price} ₽</small></div>
                </div>`;
            });
            updBtn();
        }

        function updBtn() {
            const sel = cart.filter(i => i.selected);
            if(!sel.length) { tg.MainButton.hide(); return; }
            const total = sel.reduce((s,i) => s + i.price, 0);
            tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${total} ₽)`);
            tg.MainButton.show();
        }

        async function apiAddProduct() {
            const data = {
                admin_id: tg.initDataUnsafe.user.id,
                name: document.getElementById('adm-name').value,
                price: document.getElementById('adm-price').value,
                image_url: document.getElementById('adm-img').value,
                description: document.getElementById('adm-desc').value,
                category: document.getElementById('adm-cat').value
            };
            await fetch(`${API}/add_product`, { method: 'POST', body: JSON.stringify(data) });
            alert("Товар добавлен!");
            location.reload();
        }

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            el.classList.add('active');
            if(id === 'cart') renderCart(); else tg.MainButton.hide();
        }

        tg.onEvent('mainButtonClicked', () => {
            const sel = cart.filter(i => i.selected);
            tg.sendData(JSON.stringify({
                action: 'checkout',
                order: sel,
                total: sel.reduce((s,i) => s + i.price, 0),
                delivery: document.getElementById('delivery').value,
                payment: document.getElementById('payment').value
            }));
        });

        window.onload = load;
    </script>
</body>
</html>
