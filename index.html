<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD | Premium Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --gold-light: #F9D978;
            --bg: #050505; 
            --card: rgba(25, 25, 27, 0.7); 
            --text: #ffffff; 
            --gray: #a1a1a1;
            --accent-blur: blur(20px);
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed; top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }

        .page { display: none; padding: 20px; padding-bottom: 100px; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; letter-spacing: -1.5px; margin-bottom: 25px; }
        h1 span { color: var(--gold); text-shadow: 0 0 15px rgba(212,175,55,0.3); }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { 
            background: var(--card); border-radius: 22px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.06); transition: 0.3s;
            backdrop-filter: var(--accent-blur);
        }
        .product-card:active { transform: scale(0.96); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-price { color: var(--gold); font-weight: 700; font-size: 16px; }
        .card-name { font-size: 12px; color: var(--gray); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* Премиум Модальное окно */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: flex-end; z-index: 1000;
        }
        .modal-content { 
            background: #0f0f0f; width: 100%; border-radius: 30px 30px 0 0; 
            padding: 25px; box-sizing: border-box; 
            border-top: 1px solid var(--gold);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Галерея в карточке */
        .gallery { 
            display: flex; overflow-x: auto; snap-type: x mandatory; gap: 10px; 
            margin: -10px -10px 20px -10px; padding: 10px; scrollbar-width: none;
        }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery-item { 
            min-width: 85%; aspect-ratio: 1/1.1; border-radius: 20px; 
            object-fit: cover; snap-align: center;
        }

        /* Кнопки */
        .btn { 
            background: linear-gradient(135deg, var(--gold) 0%, #B8860B 100%);
            color: #000; border: none; border-radius: 16px; padding: 16px;
            font-weight: 700; width: 100%; font-size: 15px; 
            box-shadow: 0 4px 20px rgba(212,175,55,0.25); transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .input-group { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 12px;
            font-family: inherit; box-sizing: border-box; outline: none;
        }

        /* Навигация */
        .nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(25, 25, 27, 0.8); backdrop-filter: blur(25px);
            border-radius: 24px; height: 68px; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); z-index: 100;
        }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }
        .nav-item div { font-size: 20px; margin-bottom: 2px; }

        /* Оповещение о подписке */
        .sub-screen {
            height: 80vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; padding: 30px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- Страница магазина -->
    <div id="page-shop" class="page active">
        <h1>KODAMA <span>GOLD</span></h1>
        <div class="grid" id="shop-grid"></div>
    </div>

    <!-- Страница профиля -->
    <div id="page-profile" class="page">
        <h1>ПРОФИЛЬ</h1>
        <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="color: var(--gray); font-size: 12px;">Ваш баланс</div>
            <div id="u-bal" style="font-size: 28px; font-weight: 800; color: var(--gold);">0 ₽</div>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <div style="display: flex; justify-content: space-between;">
                <div>📦 Покупок: <b id="u-spent">0 ₽</b></div>
            </div>
        </div>
        <button class="btn" style="margin-top: 20px;" onclick="tg.showAlert('Система приглашений: отправьте другу вашу ссылку!')">🔗 Партнерская программа</button>
    </div>

    <!-- Админка -->
    <div id="page-admin" class="page">
        <h1>ADMIN <span>PANEL</span></h1>
        <div style="background: var(--card); padding: 20px; border-radius: 20px;">
            <input id="p-name" class="input-group" placeholder="Название товара">
            <input id="p-price" type="number" class="input-group" placeholder="Цена (₽)">
            <textarea id="p-desc" class="input-group" style="height: 100px;" placeholder="Описание"></textarea>
            
            <label style="font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block;">ЗАГРУЗИТЬ ФОТО/ВИДЕО (MULTIPLE):</label>
            <input type="file" id="p-files" class="input-group" multiple accept="image/*,video/*" onchange="handleFiles(this.files)">
            
            <button class="btn" id="save-btn" onclick="saveProduct()">ОПУБЛИКОВАТЬ ТОВАР</button>
        </div>
    </div>

    <!-- Модалка товара -->
    <div class="modal-overlay" id="product-modal" onclick="if(event.target==this)closeProductModal()">
        <div class="modal-content" id="product-detail-content"></div>
    </div>

    <!-- Навигация -->
    <div class="nav">
        <div class="nav-item active" onclick="nav('shop', this)"><div>🛍️</div>МАГАЗИН</div>
        <div class="nav-item" onclick="nav('profile', this)"><div>👤</div>ПРОФИЛЬ</div>
        <div id="adm-btn" class="nav-item" style="display:none;" onclick="nav('admin', this)"><div>⚙️</div>CMS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ТВОЯ ССЫЛКА CLOUDFLARE
        const BASE_URL = 'https://cultures-current-news-scott.trycloudflare.com';
        const ADMINS = [1733464126];
        
        let state = { products: [], currentImages: [] };

        // Инициализация
        async function init() {
            const uid = tg.initDataUnsafe.user?.id || 0;
            
            try {
                const res = await fetch(`${BASE_URL}/init?user_id=${uid}`);
                const data = await res.json();
                
                // Проверка подписки
                if (data.is_subscribed === false) {
                    document.body.innerHTML = `
                        <div class="sub-screen">
                            <div style="font-size: 50px; margin-bottom: 20px;">🔒</div>
                            <h2 style="color: var(--gold);">ДОСТУП ЗАКРЫТ</h2>
                            <p style="color: var(--gray);">Подпишитесь на наш канал, чтобы получить доступ к эксклюзивным товарам.</p>
                            <button class="btn" onclick="tg.close()">ЗАКРЫТЬ</button>
                        </div>`;
                    return;
                }

                state.products = data.products;
                document.getElementById('u-bal').innerText = `${data.user.balance || 0} ₽`;
                document.getElementById('u-spent').innerText = `${data.user.total_spent || 0} ₽`;
                
                renderShop();

                if(ADMINS.includes(uid)) {
                    document.getElementById('adm-btn').style.display = 'block';
                }
            } catch (e) {
                tg.showAlert("Ошибка подключения к серверу: " + e);
            }
        }

        // Отрисовка товаров
        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = state.products.map(p => {
                let imgs = [];
                try { imgs = JSON.parse(p.image_url); } catch(e) { imgs = []; }
                const preview = imgs[0] || 'https://via.placeholder.com/300';
                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${preview}">
                    <div class="card-info">
                        <div class="card-price">${p.price.toLocaleString()} ₽</div>
                        <div class="card-name">${p.name}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Открытие карточки
        function openProduct(id) {
            const p = state.products.find(x => x.id === id);
            let imgs = [];
            try { imgs = JSON.parse(p.image_url); } catch(e) { imgs = []; }
            
            const content = `
                <div class="gallery">
                    ${imgs.map(src => `<img src="${src}" class="gallery-item">`).join('')}
                    ${imgs.length === 0 ? '<img src="https://via.placeholder.com/300" class="gallery-item">' : ''}
                </div>
                <h2 style="margin: 0 0 8px 0; font-size: 22px;">${p.name}</h2>
                <div style="color: var(--gold); font-size: 20px; font-weight: 800; margin-bottom: 15px;">${p.price.toLocaleString()} ₽</div>
                <div style="color: var(--gray); font-size: 14px; line-height: 1.6; max-height: 150px; overflow-y: auto; margin-bottom: 25px;">
                    ${p.description || 'Описание отсутствует'}
                </div>
                <button class="btn" onclick="addToCart(${p.id})">В КОРЗИНУ</button>
            `;
            
            document.getElementById('product-detail-content').innerHTML = content;
            document.getElementById('product-modal').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        // Работа с файлами (мультизагрузка)
        function handleFiles(files) {
            state.currentImages = [];
            const loadingCount = files.length;
            let loaded = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.currentImages.push(e.target.result);
                    loaded++;
                    if(loaded === loadingCount) {
                        tg.showAlert(`Готово к загрузке: ${loaded} файл(ов)`);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        // Сохранение товара
        async function saveProduct() {
            const btn = document.getElementById('save-btn');
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) return tg.showAlert("Заполните название и цену!");

            btn.innerText = "ЗАГРУЗКА...";
            btn.disabled = true;

            const payload = {
                admin_id: tg.initDataUnsafe.user?.id,
                action: 'save_product',
                name: name,
                price: price,
                description: document.getElementById('p-desc').value,
                images: state.currentImages,
                category: 'Premium'
            };

            try {
                const res = await fetch(`${BASE_URL}/admin_action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if(result.status === 'ok') {
                    tg.showAlert("✅ Товар успешно создан!");
                    location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (e) {
                tg.showAlert("Ошибка: " + e.message);
            } finally {
                btn.innerText = "ОПУБЛИКОВАТЬ ТОВАР";
                btn.disabled = false;
            }
        }

        function addToCart(id) {
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Товар добавлен в корзину!");
            closeProductModal();
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        window.onload = init;
    </script>
</body>
</html>
