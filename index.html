<!-- Вставь этот HTML вместо своего старого (или замени только соответствующие части) -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ... твои стили (можно не менять) ... */
        :root { --gold: #D4AF37; --bg: #050505; --card: #121212; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .profile-header { text-align: center; padding: 40px 20px; background: radial-gradient(circle at center, rgba(212,175,55,0.15) 0%, rgba(5,5,5,0) 70%); margin-bottom: 20px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.3); margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { color: var(--gold); font-size: 18px; font-weight: 800; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 10px; cursor: pointer; }
        .input-group { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; border-top: 1px solid #222; height: 70px; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 10px; display: flex; flex-direction: column; justify-content: center; }
        .nav-item.active { color: var(--gold); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: var(--card); border-radius: 15px; overflow: hidden; }
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .discount-badge { background: #D4AF37; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="shop" class="page active">
        <h1 style="font-weight: 800;">KODAMA <span style="color:var(--gold)">GOLD</span></h1>
        <div class="grid" id="products-list"></div>
    </div>

    <div id="cart" class="page">
        <h1>КОРЗИНА</h1>
        <div id="cart-items"></div>
        <div style="display: flex; gap: 5px;">
            <input id="promo" class="input-group" placeholder="Промокод" style="flex: 2;">
            <button class="btn" style="flex: 1; padding: 12px 8px;" onclick="applyPromo()">Применить</button>
        </div>
        <div id="promo-msg" style="font-size: 12px; margin-top: 5px;"></div>
        <div id="total" style="font-size: 20px; margin: 20px 0;">Итого: 0 ₽</div>
        <button class="btn" onclick="checkout()">ОФОРМИТЬ</button>
    </div>

    <div id="profile" class="page">
        <!-- ... профиль без изменений ... -->
        <div class="profile-header">
            <img id="user-photo" src="https://via.placeholder.com/100" class="avatar">
            <h2 id="user-name" style="margin: 0;">User</h2>
            <div id="user-tag" style="color: var(--gold); font-size: 14px;">@username</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="u-bal">0 ₽</div><div>Баланс</div></div>
            <div class="stat-card"><div class="stat-val" id="u-refs">0</div><div>Рефералы</div></div>
        </div>
        <div class="stat-card" style="margin-bottom: 20px;">
            <div style="font-size: 12px; color: #666;">Ваша реферальная ссылка:</div>
            <div id="ref-link" style="font-size: 11px; color: var(--gold); margin-top: 5px; word-break: break-all;">-</div>
            <button class="btn" style="padding: 8px; font-size: 12px;" onclick="copyRef()">Копировать</button>
        </div>
    </div>

    <div id="admin" class="page">
        <!-- админка без изменений -->
        <h1>АДМИН-ПАНЕЛЬ</h1>
        <div style="border-bottom: 1px solid #333; margin-bottom: 15px;">УПРАВЛЕНИЕ ТОВАРАМИ</div>
        <input id="p-name" class="input-group" placeholder="Название">
        <input id="p-price" class="input-group" placeholder="Цена">
        <textarea id="p-desc" class="input-group" placeholder="Описание"></textarea>
        <input type="file" id="p-img" class="input-group" multiple onchange="handleFiles(this.files)">
        <button class="btn" onclick="saveProduct()">СОХРАНИТЬ ТОВАР</button>
        <div style="border-bottom: 1px solid #333; margin: 20px 0 15px;">ПРОМОКОДЫ</div>
        <input id="pr-code" class="input-group" placeholder="Код">
        <input id="pr-disc" class="input-group" placeholder="Скидка (%)">
        <button class="btn" onclick="savePromo()">СОЗДАТЬ ПРОМО</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav('shop', this)">🏠 Шоп</div>
        <div class="nav-item" onclick="nav('cart', this)">🛒 Корзина</div>
        <div class="nav-item" onclick="nav('profile', this)">👤 Профиль</div>
        <div id="adm-nav" class="nav-item" style="display:none;" onclick="nav('admin', this)">⚙️ Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BASE_URL = 'https://cultures-current-news-scott.trycloudflare.com'; // укажи свой адрес
        let state = { 
            products: [], 
            cart: [],           // теперь храним {id, name, price}
            user: {}, 
            imgs: [],
            promoDiscount: 0,   // скидка в процентах
            promoCode: '' 
        };

        async function init() {
            const uid = tg.initDataUnsafe.user?.id || 0;
            const res = await fetch(`${BASE_URL}/init?user_id=${uid}`);
            const data = await res.json();
            
            state.products = data.products;
            state.user = data.user;

            document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || 'Пользователь';
            document.getElementById('user-tag').innerText = '@' + (tg.initDataUnsafe.user?.username || 'user');
            document.getElementById('u-bal').innerText = (data.user.balance || 0) + ' ₽';
            document.getElementById('u-refs').innerText = data.user.invited_count || 0;
            document.getElementById('ref-link').innerText = `https://t.me/your_bot?start=${uid}`;
            if(tg.initDataUnsafe.user?.photo_url) document.getElementById('user-photo').src = tg.initDataUnsafe.user.photo_url;

            if([1733464126].includes(uid)) document.getElementById('adm-nav').style.display = 'flex';
            
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('products-list');
            list.innerHTML = state.products.map(p => {
                let imgs = JSON.parse(p.image_url || "[]");
                return `
                <div class="p-card" onclick="addToCart(${p.id})">
                    <img src="${imgs[0] || 'https://via.placeholder.com/150'}">
                    <div style="padding:10px">
                        <div style="font-weight:800">${p.price} ₽</div>
                        <div style="font-size:12px; color:#aaa">${p.name}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(id) {
            const product = state.products.find(p => p.id === id);
            if (!product) return;
            state.cart.push({ id: product.id, name: product.name, price: product.price });
            tg.HapticFeedback.impactOccurred('medium');
            updateCart();
        }

        function updateCart() {
            let total = 0;
            document.getElementById('cart-items').innerHTML = state.cart.map((item, idx) => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <span>${item.name}</span>
                    <div>
                        <b>${item.price} ₽</b>
                        <span style="color:#D4AF37; cursor:pointer; margin-left:8px" onclick="removeFromCart(${idx})">✕</span>
                    </div>
                </div>`;
            }).join('');
            
            // Применяем скидку
            const discountAmount = total * state.promoDiscount / 100;
            const finalTotal = Math.round(total - discountAmount);
            
            let totalText = `Итого: ${finalTotal} ₽`;
            if (state.promoDiscount > 0) {
                totalText += ` <span class="discount-badge">-${state.promoDiscount}%</span>`;
            }
            document.getElementById('total').innerHTML = totalText;
        }

        function removeFromCart(idx) {
            state.cart.splice(idx, 1);
            // Сбрасываем промокод при изменении корзины (можно оставить)
            state.promoDiscount = 0;
            state.promoCode = '';
            document.getElementById('promo').value = '';
            document.getElementById('promo-msg').innerText = '';
            updateCart();
        }

        async function applyPromo() {
            const code = document.getElementById('promo').value.trim();
            if (!code) {
                document.getElementById('promo-msg').innerText = 'Введите код';
                return;
            }
            try {
                const resp = await fetch(`${BASE_URL}/check_promo`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ code })
                });
                const data = await resp.json();
                if (data.status === 'ok') {
                    state.promoDiscount = data.discount;
                    state.promoCode = code;
                    document.getElementById('promo-msg').innerText = `✅ Скидка ${data.discount}% применена`;
                } else {
                    state.promoDiscount = 0;
                    state.promoCode = '';
                    document.getElementById('promo-msg').innerText = '❌ Недействительный код';
                }
                updateCart();
            } catch(e) {
                document.getElementById('promo-msg').innerText = 'Ошибка проверки кода';
            }
        }

        function handleFiles(files) {
            state.imgs = [];
            Array.from(files).forEach(f => {
                const reader = new FileReader();
                reader.onload = e => state.imgs.push(e.target.result);
                reader.readAsDataURL(f);
            });
        }

        async function saveProduct() {
            await fetch(`${BASE_URL}/admin_action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'save_product',
                    name: document.getElementById('p-name').value,
                    price: document.getElementById('p-price').value,
                    description: document.getElementById('p-desc').value,
                    category: 'Premium',
                    images: state.imgs
                })
            });
            tg.showAlert("Товар сохранен!");
            location.reload();
        }

        async function savePromo() {
            await fetch(`${BASE_URL}/admin_action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'save_promo',
                    code: document.getElementById('pr-code').value,
                    discount: document.getElementById('pr-disc').value,
                    uses: 100
                })
            });
            tg.showAlert("Промокод создан!");
        }

        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("Ссылка скопирована!");
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function checkout() {
            if (state.cart.length === 0) {
                tg.showAlert('Корзина пуста');
                return;
            }
            const totalRaw = document.getElementById('total').innerText.match(/\d+/);
            const total = totalRaw ? parseInt(totalRaw[0]) : 0;
            // Собираем данные для отправки боту
            const orderData = {
                action: 'checkout',
                items: state.cart.map(item => item.id),
                promo: state.promoCode,
                total: total // итоговая цена с учётом скидки
            };
            // Telegram Web App закроется и отправит данные боту
            tg.sendData(JSON.stringify(orderData));
        }

        window.onload = init;
    </script>
</body>
</html>
