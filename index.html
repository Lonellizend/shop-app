<div class="grid" id="product-grid">
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Замени на URL своего запущенного бота (например, через Ngrok)
    const API_URL = "https://ngrok.com/docs/errors/err_ngrok_4018";

    let cart = [];
    let totalSum = 0;

    // ФУНКЦИЯ ЗАГРУЗКИ ТОВАРОВ ИЗ БАЗЫ
    async def loadProducts() {
        const grid = document.getElementById('product-grid');
        try {
            const response = await fetch(API_URL);
            const products = await response.json();

            grid.innerHTML = ''; // Чистим сетку

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="product-img">🌿</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <button class="add-btn" onclick="toggleCart(this, '${p.name}', ${p.price})">В корзину</button>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = '<p style="color:red">Ошибка загрузки каталога</p>';
        }
    }

    // Запускаем загрузку при открытии
    loadProducts();

    function toggleCart(btn, itemName, price) {
        const index = cart.findIndex(i => i.name === itemName);
        if (index > -1) {
            cart.splice(index, 1);
            totalSum -= price;
            btn.textContent = "В корзину";
            btn.classList.remove("added");
        } else {
            cart.push({name: itemName, price: price});
            totalSum += price;
            btn.textContent = "Добавлено";
            btn.classList.add("added");
            tg.HapticFeedback.impactOccurred('medium');
        }
        updateMainButton();
    }

    function updateMainButton() {
        if (cart.length > 0) {
            tg.MainButton.text = `ПОДТВЕРДИТЬ ЗАКАЗ (${totalSum} ₽)`;
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.MainButton.onClick(() => {
        tg.sendData(JSON.stringify({items: cart, totalPrice: totalSum}));
    });
</script>
