<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 2. ИСПОЛЬЗУЕМ ЦВЕТА ТЕМЫ ТЕЛЕГРАМА */
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ccc;
        }
        button {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Магазин в кармане</h2>
        <div class="card">
            <h3>Товар: Худи "AI Power"</h3>
            <p>Цена: 3500 руб.</p>
            <button onclick="sendData()">Добавить в заказ</button>
        </div>
    </div>

    <script>
        // Инициализация объекта WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на всё окно

        function sendData() {
            const data = {
                product: "Худи AI Power",
                price: 3500
            };
            // Отправляем данные боту (работает только для KeyboardButton)
            tg.sendData(JSON.stringify(data));
            tg.close(); // Закрываем Mini App после действия
        }
    </script>
</body>
</html>
