<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37; --gold2: #FFD700;
            --bg: #0a0a0a; --card: #1a1a1a; --card2: #222;
            --text: #fff; --text2: #999; --border: #2a2a2a;
            --danger: #ff4444; --success: #4CAF50; --blue: #3498db;
        }
        .light-theme {
            --bg: #f5f5f5; --card: #fff; --card2: #f0f0f0;
            --text: #1a1a1a; --text2: #666; --border: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 15px; padding-bottom: 75px;
            transition: background 0.3s, color 0.3s; overflow-x: hidden;
        }
        .page { display: none; padding: 16px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 16px; }
        h2 { font-size: 20px; font-weight: 700; margin: 16px 0 12px; }
        h3 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
        .gold-text { color: var(--gold); }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); backdrop-filter: blur(20px); display: flex; justify-content: space-around; border-top: 1px solid var(--border); height: 68px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text2); font-size: 10px; cursor: pointer; padding: 4px 8px; transition: 0.2s; position: relative; }
        .nav-item.active { color: var(--gold); }
        .nav-item .nav-icon { font-size: 22px; }

        .card { background: var(--card); border-radius: 16px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; }
        .btn-small { padding: 10px 16px; font-size: 13px; width: auto; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; color: var(--gold); border: 2px solid var(--gold); }

        .input { background: var(--card2); border: 1px solid var(--border); padding: 14px 16px; border-radius: 14px; color: var(--text); width: 100%; margin-bottom: 10px; font-size: 15px; }
        .input:focus { outline: none; border-color: var(--gold); }

        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { background: var(--card); border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-price { font-size: 18px; font-weight: 800; color: var(--gold); }
        .product-name { font-size: 13px; color: var(--text2); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; padding: 20px; overflow-y: auto; }
        .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal { background: var(--card); border-radius: 20px; padding: 24px; width: 100%; max-width: 500px; margin: 20px 0; }
        .modal-close { float: right; background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }

        .chat-container { height: 300px; overflow-y: auto; margin-bottom: 12px; background: var(--bg); border-radius: 12px; padding: 12px; }
        .chat-message { margin-bottom: 8px; display: flex; }
        .chat-message.user { justify-content: flex-end; }
        .chat-message.admin { justify-content: flex-start; }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; }
        .chat-message.user .chat-bubble { background: var(--gold); color: #000; }
        .chat-message.admin .chat-bubble { background: var(--blue); color: #fff; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-value { color: var(--gold); font-size: 24px; font-weight: 800; }
        .stat-label { font-size: 11px; color: var(--text2); }

        .menu-list { display: flex; flex-direction: column; gap: 6px; }
        .menu-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); cursor: pointer; }
        .menu-icon { font-size: 24px; }
        .menu-text { flex: 1; font-weight: 600; font-size: 16px; }
        .menu-arrow { color: var(--text2); }

        .tag { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .tag-gold { background: var(--gold); color: #000; }
        .tag-green { background: var(--success); color: #fff; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 14px 24px; border-radius: 14px; z-index: 300; font-weight: 600; }
        .empty-state { text-align: center; padding: 40px; color: var(--text2); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- МАГАЗИН -->
    <div id="shop" class="page active">
        <h1>KODAMA <span class="gold-text">GOLD</span></h1>
        <div class="products-grid" id="products-list"></div>
    </div>

    <!-- КОРЗИНА -->
    <div id="cart" class="page">
        <h1>🛒 КОРЗИНА</h1>
        <div id="cart-items"></div>
        <button class="btn" onclick="openCheckoutModal()">💳 ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile" class="page">
        <div id="profile-main">
            <h2>👤 Профиль</h2>
            <div class="menu-list">
                <div class="menu-item" onclick="openProfileSection('chat')"><span class="menu-icon">💬</span><span class="menu-text">Чат с поддержкой</span></div>
            </div>
        </div>
        <div id="profile-section" style="display:none;">
            <div class="section-back" onclick="closeProfileSection()">← Назад</div>
            <div id="section-content"></div>
        </div>
    </div>

    <!-- АДМИН-ПАНЕЛЬ -->
    <div id="admin" class="page">
        <div id="admin-main">
            <h1>⚙️ АДМИН-ПАНЕЛЬ</h1>
            <div class="menu-list">
                <div class="menu-item" onclick="openAdminSection('add_product')"><span class="menu-icon">➕</span><span class="menu-text">Добавить товар</span></div>
                <div class="menu-item" onclick="openAdminSection('products')"><span class="menu-icon">📦</span><span class="menu-text">Список товаров</span></div>
                <div class="menu-item" onclick="openAdminSection('promos')"><span class="menu-icon">🎫</span><span class="menu-text">Промокоды</span></div>
                <div class="menu-item" onclick="openAdminSection('flash_sale')"><span class="menu-icon">🔥</span><span class="menu-text">Flash Sale</span></div>
                <div class="menu-item" onclick="openAdminSection('users')"><span class="menu-icon">👥</span><span class="menu-text">Пользователи</span></div>
                <div class="menu-item" onclick="openAdminSection('orders')"><span class="menu-icon">📋</span><span class="menu-text">Заказы</span></div>
                <div class="menu-item" onclick="openAdminSection('analytics')"><span class="menu-icon">📊</span><span class="menu-text">Аналитика</span></div>
                <div class="menu-item" onclick="openAdminSection('chats')"><span class="menu-icon">💬</span><span class="menu-text">Чаты поддержки</span></div>
            </div>
        </div>
        <div id="admin-section" style="display:none;">
            <div class="section-back" onclick="closeAdminSection()">← Назад</div>
            <div id="admin-content"></div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div class="modal-overlay" id="checkout-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal('checkout-modal')">✕</button>
            <h2>📋 ОФОРМЛЕНИЕ ЗАКАЗА</h2>
            <h3>🚚 Доставка</h3>
            <div id="checkout-delivery"></div>
            <h3>💳 Оплата</h3>
            <div id="checkout-payment"></div>
            <div style="font-size:20px;font-weight:700;margin:16px 0;">Итого: <span id="checkout-total">0 ₽</span></div>
            <button class="btn" onclick="confirmCheckout()">✅ ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav">
        <div class="nav-item active" onclick="nav('shop', this)"><span class="nav-icon">🏠</span> Шоп</div>
        <div class="nav-item" onclick="nav('cart', this)"><span class="nav-icon">🛒</span> Корзина</div>
        <div class="nav-item" onclick="nav('profile', this)"><span class="nav-icon">👤</span> Профиль</div>
        <div class="nav-item" id="adm-nav" style="display:none;" onclick="nav('admin', this)"><span class="nav-icon">⚙️</span> Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BASE_URL = 'https://combinations-geology-drums-lion.trycloudflare.com';

        let state = {
            products: [], cart: [], user: {},
            promoDiscount: 0, promoCode: '',
            deliveryMethod: 'courier', paymentMethod: 'card',
            adminFiles: [], allUsers: [],
            flashSale: { active: false, discount: 30, endTime: null }
        };

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // ============ ЗАГРУЗКА ============
        async function init() {
            tg.ready(); tg.expand();
            const user = tg.initDataUnsafe.user;
            if ([1733464126, 8012481749].includes(user?.id)) {
                document.getElementById('adm-nav').style.display = 'flex';
            }
            await loadData();
            loadCartFromStorage();
            updateCartUI();
        }

        async function loadData() {
            const uid = tg.initDataUnsafe.user?.id || 0;
            try {
                const res = await fetch(`${BASE_URL}/init?user_id=${uid}`);
                const data = await res.json();
                state.products = data.products && data.products.length ? data.products : getTestProducts();
                state.user = data.user || {};
            } catch(e) {
                state.products = getTestProducts();
            }
            renderProducts();
        }

        function getTestProducts() {
            return [
                {id:1, name:"Тестовый товар 1", price:1000, discount_price:null, category:"Premium", badge:"new", image_url:"[]", rating:4.5, quantity:10},
                {id:2, name:"Тестовый товар 2", price:2500, discount_price:1999, category:"Одежда", badge:"sale", image_url:"[]", rating:4.8, quantity:15},
                {id:3, name:"Тестовый товар 3", price:5000, discount_price:null, category:"Premium", badge:"hit", image_url:"[]", rating:5.0, quantity:5}
            ];
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            if (!state.products.length) { list.innerHTML = '<div class="empty-state">Нет товаров</div>'; return; }
            list.innerHTML = state.products.map(p => {
                const media = JSON.parse(p.image_url || '[]');
                const thumb = media[0] || 'https://via.placeholder.com/300';
                return `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <img src="${thumb}" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-price">${p.discount_price || p.price} ₽</div>
                        <div class="product-name">${p.name}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // ============ КОРЗИНА ============
        function addToCart(id) {
            const p = state.products.find(x => x.id === id);
            if (!p) return;
            const ex = state.cart.find(i => i.id === id);
            ex ? ex.qty++ : state.cart.push({...p, qty: 1});
            saveCartToStorage(); updateCartUI();
            showToast('Добавлено');
        }

        function removeFromCart(idx) { state.cart.splice(idx, 1); saveCartToStorage(); updateCartUI(); }

        function updateCartUI() {
            const c = document.getElementById('cart-items');
            let total = 0;
            if (!state.cart.length) { c.innerHTML = '<div class="empty-state">Корзина пуста</div>'; }
            else {
                c.innerHTML = state.cart.map((item, idx) => {
                    total += item.price * item.qty;
                    return `<div style="display:flex;justify-content:space-between;padding:8px 0;">${item.name} x${item.qty} — ${item.price*item.qty} ₽ <span onclick="removeFromCart(${idx})" style="color:var(--danger);cursor:pointer;">✕</span></div>`;
                }).join('');
            }
            document.getElementById('checkout-total').innerText = total + ' ₽';
        }

        function saveCartToStorage() { localStorage.setItem('cart', JSON.stringify(state.cart)); }
        function loadCartFromStorage() { state.cart = JSON.parse(localStorage.getItem('cart') || '[]'); }

        function openCheckoutModal() {
            if (!state.cart.length) { tg.showAlert('Корзина пуста'); return; }
            document.getElementById('checkout-delivery').innerHTML = `
                <label><input type="radio" name="del" value="courier" checked onchange="state.deliveryMethod='courier'"> 🚚 Курьер</label>
                <label><input type="radio" name="del" value="pickup" onchange="state.deliveryMethod='pickup'"> 📦 Самовывоз</label>`;
            document.getElementById('checkout-payment').innerHTML = `
                <label><input type="radio" name="pay" value="card" checked onchange="state.paymentMethod='card'"> 💳 Карта</label>
                <label><input type="radio" name="pay" value="sbp" onchange="state.paymentMethod='sbp'"> 🔵 СБП</label>
                <label><input type="radio" name="pay" value="balance" onchange="state.paymentMethod='balance'"> 💰 Баланс</label>`;
            updateCartUI();
            document.getElementById('checkout-modal').classList.add('active');
        }

        async function confirmCheckout() {
            if (!state.cart.length) { tg.showAlert('Корзина пуста'); return; }
            const total = state.cart.reduce((s, i) => s + i.price * i.qty, 0);
            const orderData = {
                action: 'checkout',
                items: state.cart.map(i => ({ id: i.id, qty: i.qty, name: i.name, price: i.price })),
                total, promo: state.promoCode,
                user_id: tg.initDataUnsafe.user?.id || 0,
                username: tg.initDataUnsafe.user?.username || '',
                delivery_method: state.deliveryMethod,
                payment_method: state.paymentMethod
            };
            tg.sendData(JSON.stringify(orderData));
            try { await fetch(`${BASE_URL}/order`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) }); } catch(e) {}
            state.cart = []; saveCartToStorage(); updateCartUI();
            closeModal('checkout-modal');
            tg.showAlert('✅ Заказ создан! Проверьте бота @KodamaShopBot для оплаты.');
        }

        // ============ ПРОФИЛЬ ============
        function openProfileSection(s) {
            document.getElementById('profile-main').style.display = 'none';
            document.getElementById('profile-section').style.display = 'block';
            if (s === 'chat') renderChat(document.getElementById('section-content'), tg.initDataUnsafe.user?.id || 0);
        }

        function closeProfileSection() {
            document.getElementById('profile-main').style.display = 'block';
            document.getElementById('profile-section').style.display = 'none';
        }

        // ============ ЧАТ КЛИЕНТА ============
        function renderChat(c, uid) {
            c.innerHTML = `<div class="chat-container" id="chat-messages">Загрузка...</div>
                <div style="display:flex;gap:8px;"><input class="input" placeholder="Сообщение..." id="chat-input" style="flex:1;margin:0;"><button class="btn btn-small" onclick="sendChat()">➤</button></div>`;
            loadChatMsgs(uid);
        }

        async function loadChatMsgs(uid) {
            try {
                const res = await fetch(`${BASE_URL}/messages/${uid}`);
                const msgs = await res.json();
                const c = document.getElementById('chat-messages');
                if (c && msgs.length) {
                    c.innerHTML = msgs.map(m => `<div class="chat-message ${m.is_from_user?'user':'admin'}"><div class="chat-bubble">${m.text}</div></div>`).join('');
                } else if (c) c.innerHTML = '<div style="color:var(--text2);text-align:center;">Напишите ваш вопрос</div>';
                if (c) c.scrollTop = c.scrollHeight;
            } catch(e) {}
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            const uid = tg.initDataUnsafe.user?.id || 0;
            await fetch(`${BASE_URL}/messages`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: uid, text, is_from_user: true }) });
            tg.sendData(JSON.stringify({ action: 'chat_message', text, user_id: uid, username: tg.initDataUnsafe.user?.username || '' }));
            input.value = '';
            loadChatMsgs(uid);
        }

        // ============ АДМИН-ПАНЕЛЬ ============
        function openAdminSection(s) {
            document.getElementById('admin-main').style.display = 'none';
            document.getElementById('admin-section').style.display = 'block';
            const c = document.getElementById('admin-content');
            if (s === 'add_product') renderAddProduct(c);
            else if (s === 'products') loadAdminProducts(c);
            else if (s === 'promos') loadAdminPromos(c);
            else if (s === 'flash_sale') renderFlashSale(c);
            else if (s === 'users') loadAdminUsers(c);
            else if (s === 'orders') loadAdminOrders(c);
            else if (s === 'analytics') loadAnalytics(c);
            else if (s === 'chats') loadChatsList(c);
        }

        function closeAdminSection() { document.getElementById('admin-main').style.display = 'block'; document.getElementById('admin-section').style.display = 'none'; }

        // 1. Добавление товара
        function renderAddProduct(c) {
            state.adminFiles = [];
            c.innerHTML = `<h3>➕ Добавить товар</h3>
                <input class="input" placeholder="Название" id="ap-name">
                <input class="input" placeholder="Цена (₽)" type="number" id="ap-price">
                <input class="input" placeholder="Скидочная цена" type="number" id="ap-discount">
                <textarea class="input" placeholder="Описание" id="ap-desc"></textarea>
                <select class="input" id="ap-category"><option>Premium</option><option>Одежда</option><option>Обувь</option><option>Аксессуары</option></select>
                <select class="input" id="ap-badge"><option value="">Без бейджа</option><option value="new">🆕 Новинка</option><option value="hit">🔥 Хит</option><option value="sale">🎉 Скидка</option></select>
                <input class="input" placeholder="Количество" type="number" id="ap-qty" value="10">
                <input type="file" class="input" id="ap-files" multiple accept="image/*,video/*" onchange="previewFiles(this.files)">
                <div id="ap-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"></div>
                <button class="btn" onclick="submitProduct()">💾 СОХРАНИТЬ</button>
                <div id="ap-status" style="margin-top:8px;"></div>`;
        }

        function previewFiles(files) {
            state.adminFiles = []; const p = document.getElementById('ap-preview'); if (!p) return; p.innerHTML = '';
            Array.from(files).forEach(f => { const r = new FileReader(); r.onload = e => { state.adminFiles.push(e.target.result); p.innerHTML += `<img src="${e.target.result}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">`; }; r.readAsDataURL(f); });
        }

        async function submitProduct() {
            const name = document.getElementById('ap-name')?.value?.trim(), price = parseInt(document.getElementById('ap-price')?.value || 0);
            if (!name || !price) { showToast('Заполните название и цену'); return; }
            const data = { action: 'save_product', name, price, discount_price: parseInt(document.getElementById('ap-discount')?.value || 0) || null, description: document.getElementById('ap-desc')?.value || '', category: document.getElementById('ap-category')?.value || 'Premium', badge: document.getElementById('ap-badge')?.value || null, quantity: parseInt(document.getElementById('ap-qty')?.value || 10), images: state.adminFiles || [] };
            try {
                const res = await fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (res.ok) { await loadData(); showToast('✅ Сохранён!'); openAdminSection('products'); }
                else { data.id = Date.now(); data.image_url = JSON.stringify(data.images); state.products.unshift(data); renderProducts(); showToast('✅ Сохранён локально!'); openAdminSection('products'); }
            } catch(e) { data.id = Date.now(); data.image_url = JSON.stringify(data.images); state.products.unshift(data); renderProducts(); showToast('✅ Сохранён локально!'); openAdminSection('products'); }
        }

        // 2. Список товаров
        function loadAdminProducts(c) {
            c.innerHTML = '<div>Загрузка...</div>';
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(d => {
                if (d.products && d.products.length) state.products = d.products;
                c.innerHTML = '<h3>📦 Товары (' + state.products.length + ')</h3>' + state.products.map(p => `<div class="card" style="margin-bottom:6px;display:flex;justify-content:space-between;"><div><b>${p.name}</b> — ${p.price} ₽${p.discount_price ? ' (скидка: '+p.discount_price+' ₽)' : ''}</div><div><button class="btn btn-small" onclick="editProduct(${p.id})">✏️</button><button class="btn btn-small btn-danger" onclick="deleteProduct(${p.id})">🗑</button></div></div>`).join('');
            }).catch(() => { c.innerHTML = '<h3>📦 Товары</h3>' + state.products.map(p => `<div class="card"><b>${p.name}</b> — ${p.price} ₽</div>`).join(''); });
        }

        function editProduct(id) {
            const p = state.products.find(x => x.id === id); if (!p) return;
            const c = document.getElementById('admin-content');
            c.innerHTML = `<h3>✏️ Редактировать</h3>
                <input class="input" id="ep-name" value="${p.name}">
                <input class="input" type="number" id="ep-price" value="${p.price}">
                <input class="input" type="number" id="ep-discount" value="${p.discount_price || ''}">
                <input class="input" type="number" id="ep-qty" value="${p.quantity || 10}">
                <button class="btn" onclick="saveEdit(${id})">💾 Сохранить</button>`;
        }

        async function saveEdit(id) {
            const p = state.products.find(x => x.id === id); if (!p) return;
            p.name = document.getElementById('ep-name')?.value || p.name;
            p.price = parseInt(document.getElementById('ep-price')?.value || p.price);
            p.discount_price = parseInt(document.getElementById('ep-discount')?.value || 0) || null;
            p.quantity = parseInt(document.getElementById('ep-qty')?.value || 10);
            renderProducts(); showToast('✅ Обновлено!');
            try { await fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'edit_product', product_id: id, ...p }) }); } catch(e) {}
            openAdminSection('products');
        }

        function deleteProduct(id) { if (!confirm('Удалить?')) return; state.products = state.products.filter(p => p.id !== id); renderProducts(); showToast('🗑 Удалено'); try { fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete_product', product_id: id }) }); } catch(e) {} openAdminSection('products'); }

        // 3. Промокоды
        function loadAdminPromos(c) {
            c.innerHTML = `<h3>🎫 Промокоды</h3>
                <div style="display:flex;gap:8px;margin-bottom:12px;"><input class="input" placeholder="Код" id="pr-code" style="flex:1;"><input class="input" placeholder="Скидка %" type="number" id="pr-discount" style="width:100px;"><input class="input" placeholder="Использований" type="number" id="pr-uses" value="100" style="width:120px;"></div>
                <button class="btn btn-small" onclick="createPromo()">➕ Создать</button><div id="promos-list" style="margin-top:12px;">Нет промокодов</div>`;
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(d => {
                if (d.promos && d.promos.length) {
                    document.getElementById('promos-list').innerHTML = d.promos.map(p => `<div class="card" style="display:flex;justify-content:space-between;"><b>${p.code}</b> — ${p.discount}%<button class="btn btn-small btn-danger" onclick="deletePromo('${p.code}')">🗑</button></div>`).join('');
                }
            }).catch(() => {});
        }

        function createPromo() {
            const code = document.getElementById('pr-code')?.value?.trim()?.toUpperCase(), discount = parseInt(document.getElementById('pr-discount')?.value || 0), uses = parseInt(document.getElementById('pr-uses')?.value || 100);
            if (!code || !discount) { showToast('Заполните поля'); return; }
            try { fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'save_promo', code, discount, uses }) }); } catch(e) {}
            showToast('✅ Промокод создан!'); loadAdminPromos(document.getElementById('admin-content'));
        }

        function deletePromo(code) { if (!confirm('Удалить?')) return; try { fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete_promo', code }) }); } catch(e) {} showToast('🗑 Удалено'); loadAdminPromos(document.getElementById('admin-content')); }

        // 4. Flash Sale
        function renderFlashSale(c) {
            c.innerHTML = `<h3>🔥 Flash Sale</h3>
                <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--text2);">💸 Процент скидки</label><input class="input" type="number" id="fs-discount" value="${state.flashSale.discount || 30}"></div>
                <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--text2);">⏱ Длительность (часы)</label><input class="input" type="number" id="fs-hours" value="2"></div>
                <button class="btn" onclick="startFlashSale()">🚀 ЗАПУСТИТЬ</button>
                <button class="btn btn-danger" onclick="stopFlashSale()" style="margin-top:8px;">⏹ ОСТАНОВИТЬ</button>`;
        }

        function startFlashSale() {
            const d = parseInt(document.getElementById('fs-discount')?.value || 30), h = parseInt(document.getElementById('fs-hours')?.value || 2);
            state.flashSale = { active: true, discount: d, endTime: new Date(Date.now() + h * 3600000).toISOString() };
            showToast('🔥 Запущена!');
        }

        function stopFlashSale() { state.flashSale = { active: false, discount: 0, endTime: null }; showToast('Остановлена'); }

        // 5. Пользователи
        function loadAdminUsers(c) {
            c.innerHTML = '<h3>👥 Пользователи</h3><input class="input" placeholder="🔍 Поиск..." oninput="filterUsers(this.value)"><div id="users-list"></div>';
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(d => { state.allUsers = d.users || []; renderUsersList(state.allUsers); }).catch(() => { document.getElementById('users-list').innerHTML = '<div class="empty-state">Сервер недоступен</div>'; });
        }

        function renderUsersList(users) {
            const l = document.getElementById('users-list'); if (!l) return;
            if (!users || !users.length) { l.innerHTML = '<div style="color:var(--text2);">Не найдены</div>'; return; }
            l.innerHTML = users.slice(0, 30).map(u => `<div class="card" style="cursor:pointer;margin-bottom:6px;" onclick="openUserProfile(${u.user_id})"><b>@${u.username || 'нет'}</b> (ID:${u.user_id}) | 💰 ${u.balance || 0} ₽ | 👥 ${u.invited_count || 0}</div>`).join('');
        }

        function filterUsers(q) { renderUsersList(state.allUsers.filter(u => String(u.user_id).includes(q.toLowerCase()) || (u.username || '').toLowerCase().includes(q.toLowerCase()))); }

        function openUserProfile(uid) {
            const u = (state.allUsers || []).find(x => x.user_id === uid); if (!u) return;
            const c = document.getElementById('admin-content');
            c.innerHTML = `<div class="section-back" onclick="openAdminSection('users')">← Назад</div>
                <div class="card" style="text-align:center;"><h2>@${u.username || 'нет'}</h2><p>ID: ${u.user_id}</p><span class="tag tag-gold">${u.level || 'Новичок'}</span></div>
                <div class="card"><h4>💰 Баланс</h4><div style="display:flex;gap:8px;"><input class="input" type="number" id="ub-balance" value="${u.balance || 0}"><button class="btn btn-small" onclick="updateBalance(${uid})">💾</button></div></div>
                <div class="card"><h4>👥 Рефералы</h4><div class="stats-grid"><div class="stat-card"><div class="stat-value">${u.invited_count || 0}</div><div class="stat-label">Перешло</div></div><div class="stat-card"><div class="stat-value">${u.invited_bought_count || 0}</div><div class="stat-label">Купили</div></div><div class="stat-card"><div class="stat-value">${u.balance || 0} ₽</div><div class="stat-label">Заработал</div></div></div></div>`;
        }

        async function updateBalance(uid) {
            const b = parseInt(document.getElementById('ub-balance')?.value || 0);
            try { await fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update_balance', user_id: uid, balance: b }) }); showToast('✅ Обновлено!'); } catch(e) { showToast('Ошибка'); }
        }

        // 6. Заказы
        function loadAdminOrders(c) {
            c.innerHTML = '<div>Загрузка...</div>';
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(d => {
                c.innerHTML = (d.orders || []).length ? '<h3>📋 Заказы</h3>' + d.orders.map(o => `<div class="card"><b>#${o.id}</b> | ${o.status} | ${o.total_amount} ₽ | ${o.created_at?.split('T')[0] || ''}</div>`).join('') : '<div class="empty-state">Нет заказов</div>';
            }).catch(() => { c.innerHTML = '<div class="empty-state">Ошибка</div>'; });
        }

        // 7. Аналитика
        function loadAnalytics(c) {
            c.innerHTML = '<div>Загрузка...</div>';
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(d => {
                const a = d.analytics || []; const rev = a.reduce((s, x) => s + (x.revenue || 0), 0); const ord = a.reduce((s, x) => s + (x.orders_count || 0), 0); const vis = a.reduce((s, x) => s + (x.visits || 0), 0);
                c.innerHTML = `<h3>📊 Аналитика</h3><div class="stats-grid"><div class="stat-card"><div class="stat-value">${vis}</div><div class="stat-label">👥 Посетители</div></div><div class="stat-card"><div class="stat-value">${ord}</div><div class="stat-label">🛍 Заказы</div></div><div class="stat-card"><div class="stat-value">${rev} ₽</div><div class="stat-label">💰 Выручка</div></div></div>`;
            }).catch(() => { c.innerHTML = '<div class="empty-state">Ошибка</div>'; });
        }

        // 8. ЧАТЫ ПОДДЕРЖКИ (ПОЛНЫЙ БЛОК С УДАЛЕНИЕМ И ЗАВЕРШЕНИЕМ)
        function loadChatsList(c) {
            c.innerHTML = '<h3>💬 Чаты поддержки</h3><div id="chats-content">Загрузка...</div>';
            fetch(`${BASE_URL}/admin_data`).then(r => r.json()).then(async d => {
                const users = d.users || []; let html = ''; let has = false;
                for (const u of users.slice(0, 20)) {
                    try {
                        const ms = await fetch(`${BASE_URL}/messages/${u.user_id}`).then(r => r.json());
                        if (ms && ms.length) { has = true; const last = ms[ms.length - 1];
                            html += `<div class="card" style="margin-bottom:6px;"><div style="cursor:pointer;" onclick="openAdminChat(${u.user_id},'${u.username||'user'}')"><b>@${u.username||'user'+u.user_id}</b><div style="color:var(--text2);">${last.text?.slice(0,50)}</div></div><button class="btn btn-small btn-danger" onclick="event.stopPropagation();deleteChat(${u.user_id})" style="margin-top:8px;">🗑 Удалить</button></div>`; }
                    } catch(e) {}
                }
                document.getElementById('chats-content').innerHTML = has ? html : '<div class="empty-state">Нет чатов</div>';
            }).catch(() => { document.getElementById('chats-content').innerHTML = '<div class="empty-state">Сервер недоступен</div>'; });
        }

        async function deleteChat(uid) {
            if (!confirm('Удалить чат с пользователем ' + uid + '?')) return;
            try { await fetch(`${BASE_URL}/admin_action`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete_chat', user_id: uid }) }); showToast('🗑 Чат удалён'); loadChatsList(document.getElementById('admin-content')); } catch(e) { showToast('Ошибка'); }
        }

        function openAdminChat(uid, uname) {
            const c = document.getElementById('admin-content');
            c.innerHTML = `<div class="section-back" onclick="openAdminSection('chats')">← Назад</div><h4>💬 @${uname||'user'}</h4><div class="chat-container" id="admin-chat-msgs">Загрузка...</div><div style="display:flex;gap:8px;margin-top:8px;"><input class="input" placeholder="Ответ..." id="admin-chat-input" style="flex:1;margin:0;"><button class="btn btn-small" onclick="sendAdminReply(${uid})">➤</button></div><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn btn-small" onclick="endDialog(${uid})" style="background:var(--danger);color:#fff;flex:1;">🔚 Завершить диалог</button><button class="btn btn-small btn-danger" onclick="deleteChat(${uid})" style="flex:1;">🗑 Удалить</button></div>`;
            loadAdminChatMsgs(uid);
        }

        async function loadAdminChatMsgs(uid) {
            try {
                const res = await fetch(`${BASE_URL}/messages/${uid}`); const msgs = await res.json();
                const c = document.getElementById('admin-chat-msgs'); if (!c) return;
                c.innerHTML = msgs.length ? msgs.map(m => `<div class="chat-message ${m.is_from_user?'user':'admin'}"><div class="chat-bubble">${m.text}</div></div>`).join('') : '<div style="color:var(--text2);text-align:center;">Нет сообщений</div>';
                c.scrollTop = c.scrollHeight;
            } catch(e) {}
        }

        async function sendAdminReply(uid) {
            const input = document.getElementById('admin-chat-input'); if (!input) return;
            const text = input.value.trim(); if (!text) return;
            await fetch(`${BASE_URL}/messages`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: uid, text, is_from_user: false }) });
            input.value = ''; loadAdminChatMsgs(uid);
        }

        async function endDialog(uid) {
            if (!confirm('Завершить диалог?')) return;
            await fetch(`${BASE_URL}/messages`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: uid, text: '🔚 Диалог завершён. Если нужна помощь — напишите снова.', is_from_user: false }) });
            await fetch(`${BASE_URL}/end_dialog`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: uid }) });
            showToast('✅ Диалог завершён'); loadAdminChatMsgs(uid);
        }

        // ============ НАВИГАЦИЯ ============
        function nav(p, el) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); document.getElementById(p).classList.add('active'); if (el) el.classList.add('active'); }
        document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); }));
        window.onload = init;
    </script>
</body>
</html>
