<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #000000;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #status-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 3px solid #1a1a1a;
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .product-card {
            border: 1px solid var(--gold);
            padding: 15px;
            text-align: center;
            background: #0a0a0a;
        }
        .price { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-screen">
        <div class="loader"></div>
        <div id="status-text">Инициализация KODAMA GOLD...</div>
    </div>

    <h1 style="color: var(--gold); margin-top: 20px;">KODAMA CATALOG</h1>
    <div id="catalog"></div>

    <script>
        // 1. ВСТАВЬ СВОЮ ССЫЛКУ ТУТ (БЕЗ /products В КОНЦЕ)
        const API_BASE_URL = "https://latinas-industry-theatre-selection.trycloudflare.com";

        const statusScreen = document.getElementById('status-screen');
        const statusText = document.getElementById('status-text');
        const catalog = document.getElementById('catalog');

        async function loadProducts() {
            try {
                console.log("Запрос к:", `${API_BASE_URL}/products`);
                
                // Делаем запрос к боту
                const response = await fetch(`${API_BASE_URL}/products`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);

                const products = await response.json();
                console.log("Товары получены:", products);

                if (products.length === 0) {
                    catalog.innerHTML = "<p>Каталог пуст</p>";
                } else {
                    products.forEach(p => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML = `
                            <h3>${p.name}</h3>
                            <p class="price">${p.price} ₽</p>
                            <button style="background: var(--gold); border: none; padding: 5px 10px;">Купить</button>
                        `;
                        catalog.appendChild(card);
                    });
                }

                // Скрываем экран загрузки
                statusScreen.style.display = 'none';

            } catch (error) {
                console.error("Ошибка:", error);
                // ВЫВОДИМ РЕАЛЬНУЮ ОШИБКУ
                statusText.innerHTML = `
                    <span style="color: #ff4444;">ОШИБКА СВЯЗИ</span><br>
                    <small style="font-size: 12px; color: gray;">${error.message}</small><br><br>
                    <button onclick="location.reload()" style="background: var(--gold); border: none; padding: 10px;">Повторить</button>
                `;
                document.querySelector('.loader').style.display = 'none';
            }
        }

        // Запуск
        window.onload = loadProducts;
        
        // Сообщаем Telegram, что приложение готово
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
