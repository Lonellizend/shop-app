<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #050505; --card-bg: #111111; }
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: var(--dark); color: white; margin: 0; padding-bottom: 80px; }
        
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            border: 3px solid #222; border-top: 3px solid var(--gold);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .header { text-align: center; padding: 20px 10px; border-bottom: 1px solid #333; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 4px; font-size: 22px; }
        
        /* Сетка товаров */
        #catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .product-card {
            background: var(--card-bg); border: 1px solid #222;
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .product-card h3 { font-size: 14px; margin: 0 0 10px 0; color: #eee; font-weight: 400; }
        .price { color: var(--gold); font-weight: 600; font-size: 16px; margin-bottom: 15px; }
        
        .buy-btn {
            background: transparent; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 6px;
            padding: 10px 0; width: 100%; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="spinner"></div>
        <div id="loader-text" style="color: #666; font-size: 12px;">KODAMA GOLD</div>
    </div>

    <div class="header"><h1>KODAMA</h1></div>
    <div id="catalog"></div>

    <script>
        // ВСТАВЬ СВОЮ ССЫЛКУ CLOUDFLARE
        const API_BASE_URL = 'https://exclusive-can-geological-pool.trycloudflare.com/products'; 

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.color = '#D4AF37';
        tg.MainButton.textColor = '#000000';

        let cart = []; // Теперь элементы будут вида {id, name, price, qty}
        let totalPrice = 0;

        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const products = await response.json();
                const catalog = document.getElementById('catalog');
                
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} ₽</div>
                        <button class="buy-btn" id="btn-${p.id}" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">ДОБАВИТЬ</button>
                    `;
                    catalog.appendChild(card);
                });

                document.getElementById('loader-screen').style.display = 'none';
            } catch (err) {
                document.getElementById('loader-text').innerHTML = `<span style="color:#ff4444">ОШИБКА СВЯЗИ</span><br>${err.message}`;
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        function addToCart(id, name, price) {
            let item = cart.find(i => i.id === id);
            if (item) {
                item.qty += 1;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            
            totalPrice += price;
            
            const btn = document.getElementById(`btn-${id}`);
            btn.style.background = 'var(--gold)';
            btn.style.color = 'black';
            btn.innerText = `В КОРЗИНЕ (${cart.find(i => i.id === id).qty})`;
            
            tg.HapticFeedback.impactOccurred('light');
            updateMainButton();
        }

        function updateMainButton() {
            if (totalPrice > 0) {
                tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${totalPrice} ₽)`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        Telegram.WebApp.onEvent('mainButtonClicked', function() {
            const orderData = JSON.stringify({ items: cart, total: totalPrice });
            tg.sendData(orderData); 
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
