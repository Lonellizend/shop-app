<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KODAMA GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .header { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 1px solid #222; z-index: 10; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 4px; font-size: 20px; text-transform: uppercase; }
        #catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; justify-content: space-between; }
        .card h3 { font-size: 14px; margin: 0 0 10px 0; font-weight: 400; color: #ccc; }
        .price { color: var(--gold); font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); opacity: 0.8; }
        .in-cart { background: #222; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="header"><h1>KODAMA GOLD</h1></div>
    <div id="catalog"></div>

    <script>
        const API_URL = 'https://daughter-ellis-arrives-rank.trycloudflare.com'; 
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.color = '#D4AF37';
        tg.MainButton.textColor = '#000000';

        let cart = [];
        let products = [];

        async function load() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                const cat = new URLSearchParams(window.location.search).get('cat') || 'catalog';
                const container = document.getElementById('catalog');
                
                products.filter(p => p.category === cat).forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} ₽</div>
                        <button class="buy-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">В КОРЗИНУ</button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) { console.error("Ошибка загрузки"); }
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            const btn = document.getElementById(`btn-${id}`);
            btn.innerText = "ДОБАВЛЕНО";
            btn.className = "buy-btn in-cart";
            updateMainButton();
        }

        function updateMainButton() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            if (total > 0) {
                tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${total} ₽)`);
                tg.MainButton.show();
            } else tg.MainButton.hide();
        }

        tg.onEvent('mainButtonClicked', () => {
            tg.sendData(JSON.stringify(cart));
        });

        window.onload = load;
    </script>
</body>
</html>
